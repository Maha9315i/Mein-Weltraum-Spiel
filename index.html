<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Deep Space Rebellion</title>
    <style>
        body { 
            background: #020205; 
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0;
            overflow: hidden; /* Verhindert Scrollen */
        }
        /* Sternen-Hintergrund Effekt */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(white, rgba(255,255,255,0) 2px) transparent;
            background-size: 100px 100px;
            z-index: -1;
        }
        .screen { display: none; padding-top: 100px; height: 100vh; }
        .active { display: block; }
        
        h1 { font-size: 3rem; color: #00d4ff; text-shadow: 0 0 20px #00d4ff; }
        
        .container { display: flex; justify-content: center; gap: 30px; margin-top: 50px; }
        
        .fraktion { 
            border: 2px solid #00d4ff; 
            padding: 30px; 
            width: 280px; 
            border-radius: 20px; 
            background: rgba(0, 212, 255, 0.1); 
            transition: 0.4s;
            cursor: pointer;
        }
        .fraktion:hover { background: rgba(0, 212, 255, 0.3); transform: scale(1.05); }
        .icon { font-size: 60px; margin-bottom: 15px; }

        button { 
            background: transparent; 
            border: 2px solid #00d4ff; 
            color: #00d4ff; 
            padding: 15px 40px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 50px;
            transition: 0.3s;
        }
        button:hover { background: #00d4ff; color: #000; box-shadow: 0 0 20px #00d4ff; }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div id="start-screen" class="screen active">
        <h1>PROJECT: DARK SPACE</h1>
        <p>Systeme online. Bereit zum Andocken.</p>
        <br>
        <button onclick="showScreen('faction-screen')">INITIALISIEREN</button>
    </div>

    <div id="faction-screen" class="screen">
        <h2>WÄHLE DEINE SPEZIES</h2>
        <div class="container">
            <div class="fraktion" onclick="showScreen('menu-screen', 'Mensch')">
                <div class="icon">👨‍🚀</div>
                <h3>MENSCHEN</h3>
                <p>Besiedeln die Galaxie mit Mut und Technik.</p>
            </div>
            <div class="fraktion" onclick="showScreen('menu-screen', 'Alien')">
                <div class="icon">👽</div>
                <h3>ALIENS</h3>
                <p>Uralte Wesen mit mystischer Energie.</p>
            </div>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <h1 id="welcome-msg">Kommandozentrale</h1>
        <div style="border-top: 1px solid #333; padding: 40px;">
            <p>Fraktions-Status: <span id="status-text" style="color:#00d4ff">Bereit</span></p>
            <button onclick="alert('Mission startet...')">ÜBERTRAGUNG STARTEN</button>
        </div>
    </div>

    <script>
        function showScreen(screenId, choice) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(choice) {
                document.getElementById('welcome-msg').innerText = "Willkommen, " + choice;
                document.getElementById('status-text').innerText = choice + "-Flotte einsatzbereit";
            }
        }
    </script>
</body>
</html>
