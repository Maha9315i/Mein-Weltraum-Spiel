<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Deep Space Rebellion</title>
    <style>
        body { background: #020205; color: #fff; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
        .screen { display: none; padding-top: 50px; height: 100vh; }
        .active { display: block; }
        #game-container { position: relative; width: 600px; margin: 20px auto; }
        #game-canvas { border: 2px solid #00d4ff; background: #000; display: block; box-shadow: 0 0 20px #00d4ff; }
        #ui { position: absolute; top: 10px; left: 10px; text-align: left; pointer-events: none; color: #00d4ff; font-weight: bold; }
        button { background: transparent; border: 2px solid #00d4ff; color: #00d4ff; padding: 15px 30px; cursor: pointer; border-radius: 50px; font-size: 18px; }
        button:hover { background: #00d4ff; color: #000; }
        .fraktion { border: 1px solid #00d4ff; padding: 20px; cursor: pointer; margin: 10px; background: rgba(0,212,255,0.1); display: inline-block; width: 200px; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <h1>PROJECT: DARK SPACE</h1>
        <button onclick="showScreen('faction-screen')">INITIALISIEREN</button>
    </div>

    <div id="faction-screen" class="screen">
        <h2>FRAKTION WÄHLEN</h2>
        <div class="fraktion" onclick="showScreen('menu-screen', 'Mensch')"><h3>👨‍🚀 MENSCHEN</h3></div>
        <div class="fraktion" onclick="showScreen('menu-screen', 'Alien')"><h3>👽 ALIENS</h3></div>
    </div>

    <div id="menu-screen" class="screen">
        <h1 id="welcome-msg">Kommandozentrale</h1>
        <button onclick="startGame()">ÜBERTRAGUNG STARTEN</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-container">
            <div id="ui">
                LEVEL: <span id="lvl-display">1</span><br>
                XP: <span id="xp-display">0</span> / 100
            </div>
            <canvas id="game-canvas" width="600" height="400"></canvas>
        </div>
        <p>Sammle Energie-Zellen | WASD / Pfeile</p>
    </div>

    <script>
        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        
        let player = { x: 300, y: 200, size: 20, color: "#FF0011", speed: 5, xp: 0, lvl: 1, nextLvl: 100 };
        let items = [];
        let keys = {};
        let gameRunning = false;
        let levelUpMessage = "";
        let levelUpTimer = 0;

        function showScreen(screenId, choice) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(choice) document.getElementById('welcome-msg').innerText = "Bereit, " + choice + "?";
        }

        function startGame() {
            showScreen('game-screen');
            gameRunning = true;
            if(items.length === 0) spawnItem();
            gameLoop();
        }

        function spawnItem() {
            items.push({
                x: Math.random() * (canvas.width - 20) + 10,
                y: Math.random() * (canvas.height - 20) + 10,
                size: 10
            });
        }

        window.addEventListener("keydown", e => keys[e.key] = true);
        window.addEventListener("keyup", e => keys[e.key] = false);
        // Fix gegen das "Weglaufen": Wenn das Fenster den Fokus verliert, Tasten resetten
        window.addEventListener("blur", () => { keys = {}; });

        function update() {
            if (keys["ArrowUp"] || keys["w"]) player.y -= player.speed;
            if (keys["ArrowDown"] || keys["s"]) player.y += player.speed;
            if (keys["ArrowLeft"] || keys["a"]) player.x -= player.speed;
            if (keys["ArrowRight"] || keys["d"]) player.x += player.speed;

            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
            if (player.y < 0) player.y = 0;
            if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;

            items.forEach((item, index) => {
                if (player.x < item.x + item.size && player.x + player.size > item.x &&
                    player.y < item.y + item.size && player.y + player.size > item.y) {
                    items.splice(index, 1);
                    gainXP(25);
                    spawnItem();
                }
            });

            if(levelUpTimer > 0) levelUpTimer--;
        }

        function gainXP(amount) {
            player.xp += amount;
            if (player.xp >= player.nextLvl) {
                player.lvl++;
                player.xp = 0;
                player.nextLvl += 50;
                player.speed += 0.5;
                levelUpMessage = "LEVEL UP! JETZT LEVEL " + player.lvl;
                levelUpTimer = 100; // Nachricht für ca. 2 Sek anzeigen
            }
            document.getElementById("xp-display").innerText = player.xp;
            document.getElementById("lvl-display").innerText = player.lvl;
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Spieler (Schiff)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            
            // Item (Energie)
            items.forEach(item => {
                ctx.fillStyle = "#ffea00";
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.size/2, 0, Math.PI * 2);
                ctx.fill();
            });

            // Level Up Nachricht im Canvas zeichnen
            if(levelUpTimer > 0) {
                ctx.fillStyle = "#00d4ff";
                ctx.font = "bold 30px Courier New";
                ctx.fillText(levelUpMessage, 120, 200);
            }
        }

        function gameLoop() {
            if(!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
