<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Simple Canvas Game</title>
<style>
  html,body {height:100%;margin:0;background:#111;color:#eee;font-family:Arial}
  #ui {position:fixed;left:10px;top:10px;z-index:10}
  canvas {display:block;margin:0 auto;background:#222;border:4px solid #333}
  button {margin-right:8px}
</style>
</head>
<body>
<div id="ui">
  <button id="startBtn">Start</button>
  <button id="pauseBtn">Pause</button>
  <span id="score">Score: 0</span>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = canvas.width = Math.min(800, innerWidth - 40);
let H = canvas.height = Math.min(600, innerHeight - 120);

window.addEventListener('resize', ()=> {
  W = canvas.width = Math.min(800, innerWidth - 40);
  H = canvas.height = Math.min(600, innerHeight - 120);
});

const player = {x: W/2, y: H-60, w:40, h:40, speed:6};
const bullets = [];
const enemies = [];
let keys = {};
let running = false;
let score = 0;
let lastSpawn = 0;

document.addEventListener('keydown', e=> keys[e.key]=true);
document.addEventListener('keyup', e=> keys[e.key]=false);

function spawnEnemy(){
  const size = 30 + Math.random()*20;
  enemies.push({x: Math.random()*(W-size), y:-size, w:size, h:size, speed:1.5 + Math.random()*2});
}

function rectsCollide(a,b){
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function update(dt){
  if(keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
  if(keys['ArrowRight'] || keys['d']) player.x += player.speed;
  if(keys[' ']) { bullets.push({x: player.x+player.w/2-4, y: player.y, w:8, h:12, speed:8}); keys[' ']=false; }

  player.x = Math.max(0, Math.min(W-player.w, player.x));

  bullets.forEach(b=> b.y -= b.speed);
  for(let i=bullets.length-1;i>=0;i--) if(bullets[i].y + bullets[i].h < 0) bullets.splice(i,1);

  enemies.forEach(e=> e.y += e.speed);
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    if(rectsCollide(e, player)){ running=false; }
    for(let j=bullets.length-1;j>=0;j--){
      if(rectsCollide(e, bullets[j])){
        enemies.splice(i,1); bullets.splice(j,1); score += 10; break;
      }
    }
    if(e.y > H) enemies.splice(i,1);
  }

  // spawn logic
  lastSpawn += dt;
  if(lastSpawn > 800){ spawnEnemy(); lastSpawn = 0; }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // player
  ctx.fillStyle = '#4caf50'; ctx.fillRect(player.x, player.y, player.w, player.h);
  // bullets
  ctx.fillStyle = '#ffeb3b'; bullets.forEach(b=> ctx.fillRect(b.x,b.y,b.w,b.h));
  // enemies
  ctx.fillStyle = '#e91e63'; enemies.forEach(e=> ctx.fillRect(e.x,e.y,e.w,e.h));
}

let lastTime = 0;
function loop(ts){
  if(!running) return;
  const dt = ts - lastTime;
  lastTime = ts;
  update(dt);
  draw();
  document.getElementById('score').textContent = 'Score: ' + score;
  requestAnimationFrame(loop);
}

document.getElementById('startBtn').onclick = ()=>{
  if(!running){ running = true; lastTime = performance.now(); requestAnimationFrame(loop); }
};
document.getElementById('pauseBtn').onclick = ()=> { running = false; };

</script>
</body>
</html>
