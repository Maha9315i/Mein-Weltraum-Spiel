<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser-Quadrat RPG</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-container { text-align: center; border: 2px solid #444; padding: 20px; border-radius: 10px; background: #222; }
        #player { width: 50px; height: 50px; background: red; margin: 20px auto; border: 2px solid white; box-shadow: 0 0 15px red; }
        .stats { margin: 10px 0; font-size: 1.2rem; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Maha's Quest</h1>
        <div id="player"></div>
        
        <div class="stats">Level: <span id="lvl-display">1</span></div>
        <div class="stats">XP: <span id="xp-display">0 / 100</span></div>
        
        <button onclick="gainXP(20)">XP sammeln (+20)</button>
    </div>

    <script>
        // Spieler-Daten
        let player = {
            lvl: 1,
            xp: 0,
            nextLvl: 100
        };

        // Die Funktion zum XP sammeln
        function gainXP(amount) {
            player.xp += amount;
            
            // Level Up Logik
            if (player.xp >= player.nextLvl) {
                player.xp -= player.nextLvl; // Rest-XP mitnehmen
                player.lvl++;
                player.nextLvl += 50; // Es wird jedes Level schwerer
                alert("Glückwunsch! Level " + player.lvl + " erreicht!");
            }
            
            updateUI();
        }

        // Die Anzeige aktualisieren (Keine doppelten Zahlen mehr!)
        function updateUI() {
            document.getElementById("lvl-display").innerText = player.lvl;
            document.getElementById("xp-display").innerText = player.xp + " / " + player.nextLvl;
        }

        // Einmal am Anfang aufrufen, damit alles auf 0 steht
        updateUI();
    </script>
</body>
</html>
