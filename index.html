<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mein Weltraum-Spiel</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        canvas { display: block; background: #000; margin: 0 auto; border: 2px solid #444; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        .stat { font-size: 20px; margin: 5px 0; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">LEVEL: <span id="lvl-display">1</span></div>
        <div class="stat">XP: <span id="xp-display">0 / 100</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Spieler-Objekt
        let player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 30,
            color: "cyan",
            speed: 5,
            lvl: 1,
            xp: 0,
            nextLvl: 100
        };

        let items = [];
        let levelUpMessage = "";
        let levelUpTimer = 0;

        // Funktion zum Erstellen von Items
        function spawnItem() {
            items.push({
                x: Math.random() * (canvas.width - 20),
                y: Math.random() * (canvas.height - 20),
                size: 15,
                color: "yellow"
            });
        }

        // XP gewinnen und Level-Up prüfen
        function gainXP(amount) {
            player.xp += amount;
            
            if (player.xp >= player.nextLvl) {
                player.lvl++;
                player.xp = 0; // Hier kannst du auch player.xp -= player.nextLvl nutzen
                player.nextLvl += 50;
                player.speed += 0.5;
                
                levelUpMessage = "LEVEL UP! JETZT LEVEL " + player.lvl;
                levelUpTimer = 100; // Nachricht für ca. 2 Sek anzeigen
            }

            // UI-Update
            document.getElementById("xp-display").innerText = player.xp + " / " + player.nextLvl;
            document.getElementById("lvl-display").innerText = player.lvl;
        }

        // Steuerung (einfach)
        let keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function update() {
            if (keys["ArrowUp"]) player.y -= player.speed;
            if (keys["ArrowDown"]) player.y += player.speed;
            if (keys["ArrowLeft"]) player.x -= player.speed;
            if (keys["ArrowRight"]) player.x += player.speed;

            // Kollision mit Items
            items.forEach((item, index) => {
                if (player.x < item.x + item.size && player.x + player.size > item.x &&
                    player.y < item.y + item.size && player.y + player.size > item.y) {
                    items.splice(index, 1);
                    gainXP(25);
                    spawnItem();
                }
            });

            // Timer runterzählen
            if (levelUpTimer > 0) levelUpTimer--;
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Items zeichnen
            items.forEach(item => {
                ctx.fillStyle = item.color;
                ctx.fillRect(item.x, item.y, item.size, item.size);
            });

            // Spieler zeichnen
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Level-Up Nachricht zeichnen
            if (levelUpTimer > 0) {
                ctx.fillStyle = "yellow";
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.fillText(levelUpMessage, canvas.width / 2, canvas.height / 2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Spiel starten
        spawnItem();
        spawnItem();
        gameLoop();
    </script>
</body>
</html>
