<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Space Rebellion - Quests & Ore</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; }
        
        /* MENÜ & UI */
        #game-overlay { position: absolute; inset: 0; background: rgba(0,5,10,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .menu-container { width: 85%; max-width: 900px; border: 2px solid #00ffcc; padding: 25px; background: #001a1a; box-shadow: 0 0 30px #004444; }
        .tab-btn { background: #002222; border: 1px solid #00ffcc; color: #00ffcc; padding: 12px 20px; cursor: pointer; }
        .tab-btn:hover { background: #00ffcc; color: #000; }
        
        #game-ui { position: absolute; top: 15px; left: 15px; pointer-events: none; display: none; width: 250px; }
        .stat-box { background: rgba(0,15,15,0.9); padding: 15px; border: 1px solid #00ffcc; margin-bottom: 8px; font-size: 14px; }
        .quest-box { border-left: 4px solid #ffd700; color: #ffd700; }
        
        #minimap { position: absolute; bottom: 20px; right: 20px; width: 160px; height: 160px; border: 2px solid #00ffcc; display: none; background: #000; }
    </style>
</head>
<body>

    <div id="game-overlay">
        <h1 id="menu-title">SPACE REBELLION</h1>
        <div id="main-menu" class="menu-container">
            <button class="tab-btn" onclick="startGame()">MISSION STARTEN</button>
            <p style="margin-top:20px;">Fliege zur gelben Station (X:500, Y:500), um Quests anzunehmen!</p>
        </div>
    </div>

    <div id="game-ui">
        <div class="stat-box">
            HP: <span id="ui-hp">100</span> | SHD: <span id="ui-shd">100</span><br>
            CREDITS: <span id="ui-credits">0</span><br>
            ORE: <span id="ui-ore">0</span> / 10
        </div>
        <div class="stat-box quest-box" id="quest-ui">
            QUEST: Keine aktive Mission
        </div>
    </div>
    
    <canvas id="minimap"></canvas>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const mCanvas = document.getElementById("minimap");
        const mCtx = mCanvas.getContext("2d");

        const worldSize = 5000;
        let gameState = "MENU";
        
        let player = {
            worldX: 2500, worldY: 2500, angle: 0, speed: 0,
            hp: 120, maxHp: 120, shield: 80, credits: 0,
            ore: 0, color: "#00f0ff"
        };

        let quest = { active: false, targetOre: 3, currentOre: 0, reward: 500 };
        const station = { x: 500, y: 500, size: 80 };

        let aliens = [];
        let projectiles = [];
        let resources = []; // Erze/Cargo
        let mouse = { x: 0, y: 0 };
        let keys = {};
        let selectedTarget = null;

        function spawnAlien() {
            aliens.push({ x: Math.random()*worldSize, y: Math.random()*worldSize, hp: 100, max: 100 });
        }

        function startGame() {
            document.getElementById("game-overlay").style.display = "none";
            document.getElementById("game-ui").style.display = "block";
            document.getElementById("minimap").style.display = "block";
            gameState = "GAME";
            for(let i=0; i<8; i++) spawnAlien();
            gameLoop();
        }

        window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);
        window.addEventListener("mousedown", e => {
            const camX = canvas.width/2 - player.worldX, camY = canvas.height/2 - player.worldY;
            const clickX = e.clientX - camX, clickY = e.clientY - camY;
            selectedTarget = aliens.find(a => Math.sqrt((clickX-a.x)**2 + (clickY-a.y)**2) < 30);
        });

        function update() {
            // Bewegung
            const dx = mouse.x - canvas.width/2, dy = mouse.y - canvas.height/2;
            player.angle = Math.atan2(dy, dx);
            if (Math.sqrt(dx*dx + dy*dy) > 60) player.speed = Math.min(player.speed + 0.1, 5);
            else player.speed *= 0.95;
            player.worldX += Math.cos(player.angle) * player.speed;
            player.worldY += Math.sin(player.angle) * player.speed;

            // Combat & Laser
            if (keys["Space"] && selectedTarget && Math.random() < 0.1) {
                projectiles.push({ x: player.worldX, y: player.worldY, target: selectedTarget });
            }
            projectiles.forEach((p, i) => {
                const tx = p.target.x - p.x, ty = p.target.y - p.y, dist = Math.sqrt(tx*tx + ty*ty);
                if(dist < 15) {
                    p.target.hp -= 10; projectiles.splice(i, 1);
                    if(p.target.hp <= 0) {
                        resources.push({x: p.target.x, y: p.target.y}); // Loot droppen
                        aliens = aliens.filter(a => a !== p.target);
                        selectedTarget = null;
                        setTimeout(spawnAlien, 3000);
                    }
                } else { p.x += (tx/dist)*15; p.y += (ty/dist)*15; }
            });

            // Loot sammeln
            resources.forEach((r, i) => {
                if(Math.sqrt((player.worldX-r.x)**2 + (player.worldY-r.y)**2) < 30) {
                    resources.splice(i, 1);
                    player.ore++;
                    if(quest.active) quest.currentOre++;
                    updateUI();
                }
            });

            // Station & Quests
            const distToStation = Math.sqrt((player.worldX-station.x)**2 + (player.worldY-station.y)**2);
            if(distToStation < station.size) {
                if(!quest.active) {
                    quest.active = true; quest.currentOre = 0;
                    alert("QUEST ANGENOMMEN: Sammle 3 Erze von Aliens!");
                } else if(quest.currentOre >= quest.targetOre) {
                    player.credits += quest.reward;
                    quest.active = false;
                    alert("QUEST ERFÜLLT! +500 Credits erhalten.");
                }
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById("ui-hp").innerText = Math.floor(player.hp);
            document.getElementById("ui-shd").innerText = Math.floor(player.shield);
            document.getElementById("ui-credits").innerText = player.credits;
            document.getElementById("ui-ore").innerText = player.ore;
            
            const qBox = document.getElementById("quest-ui");
            if(quest.active) {
                qBox.innerText = `QUEST: Erze sammeln (${quest.currentOre}/${quest.targetOre})`;
            } else {
                qBox.innerText = "QUEST: Fliege zur Station für Mission";
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            const camX = canvas.width/2 - player.worldX, camY = canvas.height/2 - player.worldY;
            ctx.save(); ctx.translate(camX, camY);

            // Gitter & Welt
            ctx.strokeStyle = "#002222";
            for(let i=0; i<=worldSize; i+=500) { ctx.strokeRect(i,0,1,worldSize); ctx.strokeRect(0,i,worldSize,1); }

            // Station
            ctx.fillStyle = "#ffd700";
            ctx.beginPath(); ctx.arc(station.x, station.y, station.size, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.fillText("QUEST STATION", station.x-40, station.y);

            // Erze
            resources.forEach(r => { ctx.fillStyle = "#aaa"; ctx.fillRect(r.x-5, r.y-5, 10, 10); });
            
            // Laser
            projectiles.forEach(p => { ctx.strokeStyle = "red"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-5,p.y-5); ctx.stroke(); });

            // Aliens
            aliens.forEach(a => {
                ctx.fillStyle = "#ff00ff"; ctx.beginPath(); ctx.arc(a.x, a.y, 15, 0, Math.PI*2); ctx.fill();
                if(selectedTarget === a) { ctx.strokeStyle="red"; ctx.strokeRect(a.x-20, a.y-20, 40, 40); }
            });
            ctx.restore();

            // Spieler
            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(player.angle);
            ctx.fillStyle = player.color; ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(-10,12); ctx.lineTo(-10,-12); ctx.fill();
            ctx.restore();

            // Minimap
            mCtx.fillStyle="black"; mCtx.fillRect(0,0,160,160);
            mCtx.fillStyle="#ffd700"; mCtx.fillRect(station.x/worldSize*160, station.y/worldSize*160, 6, 6); // Station auf Map
            mCtx.fillStyle="cyan"; mCtx.fillRect(player.worldX/worldSize*160, player.worldY/worldSize*160, 3, 3);
            
            update(); requestAnimationFrame(draw);
        }

        window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        mCanvas.width = 160; mCanvas.height = 160;
    </script>
</body>
</html>
