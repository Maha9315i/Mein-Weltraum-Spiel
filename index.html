<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Space Rebellion - Alpha V3</title>
    <style>
        /* Das Design der Oberfläche */
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 10px; left: 10px; color: #00ffcc;
            background: rgba(0, 20, 20, 0.7); padding: 10px; border: 1px solid #00ffcc;
            pointer-events: none; z-index: 10;
        }

        #minimap {
            position: absolute; bottom: 20px; right: 20px;
            width: 150px; height: 150px;
            background: #000; border: 2px solid #00ffcc;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui">
        Pos: <span id="pos-display">0 | 0</span>
    </div>
    
    <canvas id="minimap"></canvas>
    <canvas id="gameCanvas"></canvas>

    <script>
        // --- HIER BEGINNT DEIN CODE ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const mCanvas = document.getElementById("minimap");
        const mCtx = mCanvas.getContext("2d");

        const worldSize = 5000;
        let mouse = { x: 0, y: 0 };

        const player = {
            worldX: 2500, worldY: 2500,
            size: 25, angle: 0, speed: 0, maxSpeed: 5,
            color: "#00f0ff"
        };

        // Hintergrund Setup
        const starLayers = [
            { count: 300, speed: 0.05, size: 1, color: "#444" },
            { count: 150, speed: 0.15, size: 1.2, color: "#888" },
            { count: 60,  speed: 0.4,  size: 2, color: "#fff" }
        ];

        const backgroundObjects = starLayers.map(layer => {
            let stars = [];
            for(let i = 0; i < layer.count; i++) {
                stars.push({ x: Math.random() * worldSize, y: Math.random() * worldSize });
            }
            return stars;
        });

        const nebulae = Array.from({ length: 8 }, () => ({
            x: Math.random() * worldSize,
            y: Math.random() * worldSize,
            size: 500 + Math.random() * 700,
            color: Math.random() > 0.5 ? "rgba(50, 0, 100, 0.15)" : "rgba(0, 50, 100, 0.15)"
        }));

        const aliens = [
            { worldX: 2800, worldY: 2300, size: 40, color: "#ff00ff", hp: 100 },
            { worldX: 1500, worldY: 3500, size: 40, color: "#ff00ff", hp: 100 }
        ];

        window.addEventListener("mousemove", (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function update() {
            const dx = mouse.x - canvas.width / 2;
            const dy = mouse.y - canvas.height / 2;
            player.angle = Math.atan2(dy, dx);

            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 60) {
                player.speed = Math.min(player.speed + 0.1, player.maxSpeed);
            } else {
                player.speed *= 0.95;
            }

            player.worldX += Math.cos(player.angle) * player.speed;
            player.worldY += Math.sin(player.angle) * player.speed;

            player.worldX = Math.max(0, Math.min(worldSize, player.worldX));
            player.worldY = Math.max(0, Math.min(worldSize, player.worldY));

            document.getElementById("pos-display").innerText = 
                Math.floor(player.worldX) + " | " + Math.floor(player.worldY);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const camX = canvas.width / 2 - player.worldX;
            const camY = canvas.height / 2 - player.worldY;

            // Nebel
            ctx.save();
            ctx.translate(camX * 0.05, camY * 0.05);
            nebulae.forEach(n => {
                let grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.size);
                grad.addColorStop(0, n.color);
                grad.addColorStop(1, "transparent");
                ctx.fillStyle = grad;
                ctx.fillRect(n.x - n.size, n.y - n.size, n.size * 2, n.size * 2);
            });
            ctx.restore();

            // Sterne
            backgroundObjects.forEach((stars, i) => {
                const layer = starLayers[i];
                ctx.save();
                ctx.translate(camX * layer.speed, camY * layer.speed);
                ctx.fillStyle = layer.color;
                stars.forEach(s => ctx.fillRect(s.x, s.y, layer.size, layer.size));
                ctx.restore();
            });

            // Welt-Objekte
            ctx.save();
            ctx.translate(camX, camY);
            ctx.strokeStyle = "rgba(0, 255, 200, 0.05)";
            for(let i=0; i<=worldSize; i+=250) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, worldSize); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(worldSize, i); ctx.stroke();
            }
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 3;
            ctx.strokeRect(0, 0, worldSize, worldSize);

            aliens.forEach(a => {
                ctx.fillStyle = a.color;
                ctx.shadowBlur = 15; ctx.shadowColor = a.color;
                ctx.beginPath(); ctx.arc(a.worldX, a.worldY, a.size/2, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            });
            ctx.restore();

            drawPlayer();
            drawMinimap();
            requestAnimationFrame(() => { update(); draw(); });
        }

       function drawPlayer() {
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(player.angle);

    // 1. Triebwerks-Flamme (animiert & glühend)
    if (player.speed > 0.5) {
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#00f0ff";
        ctx.fillStyle = "rgba(0, 240, 255, " + (Math.random() * 0.4 + 0.4) + ")";
        ctx.beginPath();
        ctx.moveTo(-15, 0);
        ctx.lineTo(-30 - (player.speed * 4), 8);
        ctx.lineTo(-20, 0);
        ctx.lineTo(-30 - (player.speed * 4), -8);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // 2. Flügel (Außenhülle)
    ctx.strokeStyle = player.color;
    ctx.lineWidth = 2;
    ctx.fillStyle = "#0a0a0a"; // Fast schwarzer Rumpf
    
    ctx.beginPath();
    ctx.moveTo(28, 0);        // Spitze vorn
    ctx.lineTo(-10, 22);      // Flügelspitze links
    ctx.lineTo(-5, 8);        // Knick zum Heck
    ctx.lineTo(-15, 0);       // Heck-Mitte
    ctx.lineTo(-5, -8);       // Knick zum Heck
    ctx.lineTo(-10, -22);     // Flügelspitze rechts
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // 3. Cockpit (Bläuliches Glas)
    ctx.fillStyle = "rgba(0, 200, 255, 0.5)";
    ctx.beginPath();
    ctx.ellipse(5, 0, 10, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "white";
    ctx.lineWidth = 1;
    ctx.stroke();

    // 4. Positionslichter (Rot/Grün wie bei echten Schiffen)
    ctx.fillStyle = "#ff0000";
    ctx.fillRect(-10, 18, 4, 4); // Links rot
    ctx.fillStyle = "#00ff00";
    ctx.fillRect(-10, -22, 4, 4); // Rechts grün

    ctx.restore();
}
        function drawMinimap() {
            mCtx.fillStyle = "black";
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
            const scale = mCanvas.width / worldSize;
            mCtx.fillStyle = "cyan";
            mCtx.fillRect(player.worldX * scale, player.worldY * scale, 3, 3);
            mCtx.fillStyle = "red";
            aliens.forEach(a => mCtx.fillRect(a.worldX * scale, a.worldY * scale, 2, 2));
        }

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        mCanvas.width = 150; mCanvas.height = 150;
        draw();
    </script>
</body>
</html>
