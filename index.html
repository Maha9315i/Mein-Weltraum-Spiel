<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Space Rebellion - Engine V2</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #ui-overlay {
            position: absolute; top: 10px; left: 10px; color: #00ffcc;
            pointer-events: none; /* Klicks gehen durch das UI aufs Spiel */
        }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div>Position: <span id="pos-display">0, 0</span></div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Spieleinstellungen
    const worldSize = 5000; // Die Größe des Universums
    let keys = {};

    // Das Player-Objekt (Welt-Koordinaten)
    const player = {
        worldX: 2500, // Start in der Mitte der Welt
        worldY: 2500,
        size: 30,
        angle: 0,
        speed: 0,
        maxSpeed: 7,
        accel: 0.2
    };

    // Sterne generieren für den Hintergrund
    const stars = [];
    for(let i = 0; i < 400; i++) {
        stars.push({
            x: Math.random() * worldSize,
            y: Math.random() * worldSize,
            size: Math.random() * 2
        });
    }

    window.addEventListener("keydown", e => keys[e.code] = true);
    window.addEventListener("keyup", e => keys[e.code] = false);

    function update() {
        // Steuerung (WASD oder Pfeile)
        if (keys["ArrowLeft"] || keys["KeyA"]) player.angle -= 0.05;
        if (keys["ArrowRight"] || keys["KeyD"]) player.angle += 0.05;
        
        if (keys["ArrowUp"] || keys["KeyW"]) {
            player.speed = Math.min(player.speed + player.accel, player.maxSpeed);
        } else {
            player.speed *= 0.98; // Gleiten im All
        }

        // Bewegung in der Welt
        player.worldX += Math.cos(player.angle) * player.speed;
        player.worldY += Math.sin(player.angle) * player.speed;

        // UI Update
        document.getElementById("pos-display").innerText = 
            Math.floor(player.worldX) + ", " + Math.floor(player.worldY);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- KAMERA LOGIK ---
        // Wir verschieben den gesamten Kontext so, dass der Spieler in der Mitte ist
        const camX = canvas.width / 2 - player.worldX;
        const camY = canvas.height / 2 - player.worldY;

        ctx.save();
        ctx.translate(camX, camY);

        // 1. Welt-Grenzen zeichnen
        ctx.strokeStyle = "#333";
        ctx.strokeRect(0, 0, worldSize, worldSize);

        // 2. Sterne zeichnen (liegen fest in der Welt)
        ctx.fillStyle = "white";
        stars.forEach(star => {
            ctx.fillRect(star.x, star.y, star.size, star.size);
        });

        // 3. Spieler zeichnen (Relativ zur Kamera)
        ctx.restore(); // Wir nehmen die Kamera kurz raus für das Schiff-Design
        
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2); // Schiff immer Bildschirmmitte
        ctx.rotate(player.angle);
        
        ctx.fillStyle = "cyan";
        ctx.beginPath();
        ctx.moveTo(20, 0); ctx.lineTo(-15, 15); ctx.lineTo(-15, -15);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    draw();
</script>
</body>
</html>
