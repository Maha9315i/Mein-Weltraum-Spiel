<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Weltraum-Spiel</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: none; }
        #start-menu { text-align: center; border: 2px solid #00ffcc; padding: 30px; background: rgba(0, 10, 10, 0.9); }
        .btn-container { display: flex; gap: 15px; margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; border: 1px solid #00ffcc; background: transparent; color: #00ffcc; font-weight: bold; }
        button:hover { background: #00ffcc; color: #000; }
        #ui { position: absolute; top: 20px; left: 20px; display: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="start-menu">
        <h1>WÄHLE DEINE SPEZIES</h1>
        <div class="btn-container">
            <button onclick="startGame('MENSCH')">MENSCH</button>
            <button onclick="startGame('ALIEN')">ALIEN</button>
        </div>
    </div>

    <div id="ui">
        <div id="faction-name" style="color: yellow; font-weight: bold;">-</div>
        <div>LVL: <span id="lvl-display">1</span></div>
        <div>XP: <span id="xp-display">0 / 100</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let gameRunning = false;
        let player = { x: 0, y: 0, size: 30, color: "white", speed: 5, lvl: 1, xp: 0, nextLvl: 100 };
        let items = [];
        let levelUpMessage = "";
        let levelUpTimer = 0;
        let keys = {};

        function startGame(faction, color) {
            document.getElementById("start-menu").style.display = "none";
            document.getElementById("ui").style.display = "block";
            canvas.style.display = "block";
            player.color = color;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            document.getElementById("faction-name").innerText = faction;
            gameRunning = true;
            for(let i = 0; i < 5; i++) spawnItem();
            gameLoop();
        }

        function spawnItem() {
            items.push({ x: Math.random() * (window.innerWidth - 20), y: Math.random() * (window.innerHeight - 20), size: 15, color: "yellow" });
        }

        function gainXP(amount) {
            player.xp += amount;
            if (player.xp >= player.nextLvl) {
                player.lvl++;
                player.xp = 0;
                player.nextLvl += 50;
                player.speed += 0.5;
                levelUpMessage = "LEVEL UP! LEVEL " + player.lvl;
                levelUpTimer = 100;
            }
            document.getElementById("xp-display").innerText = player.xp + " / " + player.nextLvl;
            document.getElementById("lvl-display").innerText = player.lvl;
        }

        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function update() {
            if (!gameRunning) return;
            if (keys["ArrowUp"] && player.y > 0) player.y -= player.speed;
            if (keys["ArrowDown"] && player.y < canvas.height - player.size) player.y += player.speed;
            if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < canvas.width - player.size) player.x += player.speed;

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                if (player.x < it.x + it.size && player.x + player.size > it.x && player.y < it.y + it.size && player.y + player.size > it.y) {
                    items.splice(i, 1);
                    gainXP(25);
                    spawnItem();
                }
            }
            if (levelUpTimer > 0) levelUpTimer--;
        }

        function draw() {
            if (!gameRunning) return;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            items.forEach(it => { ctx.fillStyle = it.color; ctx.fillRect(it.x, it.y, it.size, it.size); });
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            if (levelUpTimer > 0) {
                ctx.fillStyle = "yellow";
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.fillText(levelUpMessage, canvas.width / 2, canvas.height / 2);
            }
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(gameLoop);
        }

        window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    </script>
</body>
</html>
