<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Space Rebellion - Alpha V3</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: #00ffcc;
            background: rgba(0, 20, 20, 0.7); padding: 10px; border: 1px solid #00ffcc;
            pointer-events: none;
        }
        #minimap {
            position: absolute; bottom: 20px; right: 20px;
            width: 150px; height: 150px;
            background: rgba(0, 40, 40, 0.5); border: 2px solid #00ffcc;
        }
    </style>
</head>
<body>

<div id="ui">
    Pos: <span id="pos-display">0, 0</span>
</div>
<canvas id="minimap" id="minimapCanvas"></canvas>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const mCanvas = document.getElementById("minimap");
    const mCtx = mCanvas.getContext("2d");

    const worldSize = 4000;
    let mouse = { x: 0, y: 0 };

    const player = {
        worldX: 2000, worldY: 2000,
        size: 25, angle: 0, speed: 0, maxSpeed: 4
    };

    // Ein einfaches Alien
    const aliens = [
        { worldX: 2200, worldY: 2200, size: 30, color: "#ff00ff", hp: 100 }
    ];

    // Maus-Position erfassen
    window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    function update() {
        // 1. Winkel zur Maus berechnen (Das Herz der Steuerung)
        const dx = mouse.x - canvas.width / 2;
        const dy = mouse.y - canvas.height / 2;
        player.angle = Math.atan2(dy, dx);

        // 2. Bewegung: Immer Richtung Winkel, wenn Maus weit genug weg ist
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 50) { // Kleiner Puffer, damit das Schiff nicht zittert
            player.speed = player.maxSpeed;
        } else {
            player.speed *= 0.9; // Bremsen
        }

        player.worldX += Math.cos(player.angle) * player.speed;
        player.worldY += Math.sin(player.angle) * player.speed;

        // Grenzen einhalten
        player.worldX = Math.max(0, Math.min(worldSize, player.worldX));
        player.worldY = Math.max(0, Math.min(worldSize, player.worldY));

        document.getElementById("pos-display").innerText = 
            Math.floor(player.worldX) + " | " + Math.floor(player.worldY);
    }

    function drawMinimap() {
        mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
        const scale = mCanvas.width / worldSize;

        // Dein Schiff auf der Minimap
        mCtx.fillStyle = "cyan";
        mCtx.fillRect(player.worldX * scale, player.worldY * scale, 4, 4);

        // Aliens auf der Minimap
        mCtx.fillStyle = "red";
        aliens.forEach(a => mCtx.fillRect(a.worldX * scale, a.worldY * scale, 3, 3));
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Kamera-Offset berechnen
        const camX = canvas.width / 2 - player.worldX;
        const camY = canvas.height / 2 - player.worldY;

        ctx.save();
        ctx.translate(camX, camY);

        // Gitter zeichnen (für das Bewegungsgefühl)
        ctx.strokeStyle = "#112222";
        for(let i=0; i<=worldSize; i+=200) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, worldSize); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(worldSize, i); ctx.stroke();
        }

        // Alien zeichnen
        aliens.forEach(a => {
            ctx.fillStyle = a.color;
            ctx.beginPath();
            ctx.arc(a.worldX, a.worldY, a.size/2, 0, Math.PI*2);
            ctx.fill();
            // HP Balken über dem Alien
            ctx.fillStyle = "red";
            ctx.fillRect(a.worldX - 15, a.worldY - 25, 30, 4);
        });

        ctx.restore();

// --- VERBESSERTES SCHIFFS-DESIGN ---
ctx.save();
ctx.translate(canvas.width / 2, canvas.height / 2);
ctx.rotate(player.angle);

// 1. Triebwerksleuchten (animiert)
if (player.speed > 0.5) {
    ctx.fillStyle = "rgba(0, 255, 255, " + (Math.random() * 0.5 + 0.5) + ")";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "cyan";
    ctx.beginPath();
    ctx.moveTo(-15, 0);
    ctx.lineTo(-30 - (player.speed * 2), 0); // Flamme wird länger bei Speed
    ctx.stroke();
}

// 2. Der Hauptrumpf
ctx.shadowBlur = 10;
ctx.shadowColor = player.color;
ctx.fillStyle = "#111"; // Dunkler Kern
ctx.strokeStyle = player.color;
ctx.lineWidth = 2;

ctx.beginPath();
ctx.moveTo(25, 0);       // Spitze
ctx.lineTo(-10, 15);     // Flügel links unten
ctx.lineTo(-5, 5);       // Einbuchtung hinten
ctx.lineTo(-5, -5);      // Einbuchtung hinten
ctx.lineTo(-10, -15);    // Flügel rechts unten
ctx.closePath();
ctx.fill();
ctx.stroke();

// 3. Cockpit-Glas
ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
ctx.beginPath();
ctx.ellipse(5, 0, 8, 4, 0, 0, Math.PI * 2);
ctx.fill();

// 4. Details (Positionslichter)
ctx.fillStyle = "red";
ctx.fillRect(-12, 14, 3, 3);
ctx.fillStyle = "lime";
ctx.fillRect(-12, -17, 3, 3);

ctx.restore();

        drawMinimap();
        requestAnimationFrame(() => { update(); draw(); });
    }

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    mCanvas.width = 150; mCanvas.height = 150;

    draw();
</script>
</body>
</html>
